name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # lint:ruff format + check
  # =========================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: ruff check
        run: uv run ruff check .

  # =========================================================
  # typecheck:basedpyright
  # =========================================================
  typecheck:
    name: Type check (basedpyright)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync
      - name: basedpyright
        run: uv run basedpyright

  # =========================================================
  # test:Python 3.10/3.11/3.12 矩阵 + LocalManager + 覆盖率
  # =========================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dev deps
        run: uv sync --python ${{ matrix.python-version }}
      - name: Run unit + integration (LocalManager only)
        # online 用例在独立的 online-test job 里跑,本 job 故意不覆盖 wmr/online.py
        # 因此关闭 90% 总覆盖率门槛(coverage XML 仍上传至 codecov 做汇总)
        run: uv run pytest -m "unit or integration and not online" -v --cov-fail-under=0
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # =========================================================
  # online + parity:ClickHouse service container
  # =========================================================
  online-test:
    name: Online + Parity (ClickHouse)
    runs-on: ubuntu-latest
    needs: lint
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        env:
          # 使用专属测试用户,避免 24.x 默认 default 用户被禁用/带随机密码导致连不上
          CLICKHOUSE_USER: ci
          CLICKHOUSE_PASSWORD: ci
          CLICKHOUSE_DB: default
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        options: >-
          --health-cmd "wget --spider -q http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync
      - name: Wait for ClickHouse
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8123/ping; then echo "CH ready"; break; fi
            sleep 2
          done
      - name: Run online + parity tests
        env:
          WMR_TEST_CLICKHOUSE_DSN: clickhouse://ci:ci@localhost:8123
        run: uv run pytest -m "online or parity" -v --no-cov

  # =========================================================
  # examples:确保 examples/quickstart.py 可直接运行(C6)
  # =========================================================
  examples:
    name: Examples runtime check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync(without dev)
        run: uv sync --no-dev
      - name: Run quickstart
        run: uv run python examples/quickstart.py

  # =========================================================
  # perf:手动触发(workflow_dispatch)
  # =========================================================
  perf:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync
      - name: Run perf benchmarks
        run: uv run pytest -m perf --run-perf -v --no-cov
